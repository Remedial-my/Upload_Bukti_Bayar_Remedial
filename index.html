<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Unggah Bukti Pembayaran Remedial Semester</title>
  <link rel="icon" href="https://i.imgur.com/VDy2lSE.png" />
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background-color: #f5f5f5;
      overflow: hidden;
    }
    
    .iframe-container {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;           /* Ubah dari auto ke hidden */
      box-sizing: border-box;
    }
    
    iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
      overflow: hidden;
    }
  </style>
</head>
<body>
  <div class="iframe-container">
    <iframe
      id="app"
      src="https://script.google.com/macros/s/AKfycbzA99v6Ey5UATKJh2LFE5_XNLjolccRzxqqkymLo4cvmrazX9MI3WR6HdAVjobB-_z-/exec?page=upload"
      scrolling="no"                    <!-- Ubah ke 'no' -->
      allowfullscreen="true"
      webkitallowfullscreen="true"
      mozallowfullscreen="true">
    </iframe>
  </div>
</body>
</html>
