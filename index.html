<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Unggah Bukti Pembayaran Remedial Semester</title>
  <link rel="icon" href="https://i.imgur.com/VDy2lSE.png" />
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background-color: #eee;
      overflow: hidden; /* Kunci body, biarkan iframe yang mengatur scroll */
    }

    .iframe-container {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      width: 100%;
      height: 100%;
      overflow: auto; /* Izinkan iframe untuk scroll jika kontennya panjang */
      box-sizing: border-box; /* Pastikan padding dihitung dalam tinggi elemen */
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }
  </style>
</head>
<body>
  <div class="iframe-container">
    <iframe
      id="app"
      src="https://script.google.com/macros/s/AKfycbzA99v6Ey5UATKJh2LFE5_XNLjolccRzxqqkymLo4cvmrazX9MI3WR6HdAVjobB-_z-/exec?page=upload"
      scrolling="yes"
      allowfullscreen="true"
      webkitallowfullscreen="true"
      mozallowfullscreen="true"
      allow="fullscreen; camera; microphone; display-capture; geolocation;">
    </iframe>
  </div>
</body>
</html>
